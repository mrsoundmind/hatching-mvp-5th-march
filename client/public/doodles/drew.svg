<svg viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
  <!-- Friendly Drew Engineer -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="5s" repeatCount="indefinite"/>

    <!-- Neck -->
    <rect x="52" y="90" width="16" height="14" rx="6" fill="#d4a67d"/>

    <!-- Hoodie collar -->
    <path d="M38 108 Q48 100 60 102 Q72 100 82 108" stroke="#4a5568" stroke-width="3" fill="#2d3748" stroke-linecap="round"/>
    <path d="M52 102 L56 112 L60 108 L64 112 L68 102" stroke="#4a5568" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Face (warm skin) -->
    <ellipse cx="60" cy="64" rx="26" ry="30" fill="#d4a67d"/>

    <!-- Hair (messy dark spiky) -->
    <path d="M34 48c2-24 12-36 26-36 14 0 24 14 26 36" fill="#1a1a2e"/>
    <path d="M34 46l-5-10 6 3 0-12 6 8 4-14 4 10 6-12 4 12 7-10 3 14 6-8 1 12 4-6 0 10" fill="#1a1a2e" stroke="#1a1a2e" stroke-width="1" stroke-linejoin="round"/>

    <!-- Ears -->
    <ellipse cx="34" cy="64" rx="5" ry="7" fill="#d4a67d"/>
    <ellipse cx="86" cy="64" rx="5" ry="7" fill="#d4a67d"/>

    <!-- Glasses -->
    <rect x="36" y="55" width="19" height="16" rx="5" stroke="#555" stroke-width="2.5" fill="white" fill-opacity="0.15"/>
    <rect x="65" y="55" width="19" height="16" rx="5" stroke="#555" stroke-width="2.5" fill="white" fill-opacity="0.15"/>
    <path d="M55 62c2-2 8-2 10 0" stroke="#555" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M36 62l-4-2" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <path d="M84 62l4-2" stroke="#555" stroke-width="2" stroke-linecap="round"/>
    <!-- Lens glint -->
    <line x1="40" y1="58" x2="44" y2="57" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.3">
      <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
    </line>

    <!-- Eyebrows -->
    <path d="M39 50c4-4 10-4 14-1" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-1.5;0,0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </path>
    <path d="M67 49c4-3 10-3 14 1" stroke="#1a1a2e" stroke-width="2.5" fill="none" stroke-linecap="round">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-0.5;0,0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </path>

    <!-- Eyes with blink -->
    <g>
      <!-- Left eye -->
      <ellipse cx="46" cy="63" rx="5" ry="5.5" fill="white">
        <animate attributeName="ry" values="5.5;0.4;5.5" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </ellipse>
      <ellipse cx="46.5" cy="63.5" rx="3" ry="3.2" fill="#2563eb">
        <animate attributeName="ry" values="3.2;0.2;3.2" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
        <animate attributeName="cx" values="46.5;47.5;46.5;45.5;46.5" dur="7s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="46.5" cy="63.5" r="1.5" fill="#0f172a">
        <animate attributeName="r" values="1.5;0.1;1.5" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </circle>
      <circle cx="44.5" cy="61.5" r="1.3" fill="white" opacity="0.9">
        <animate attributeName="r" values="1.3;0;1.3" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </circle>

      <!-- Right eye -->
      <ellipse cx="74" cy="63" rx="5" ry="5.5" fill="white">
        <animate attributeName="ry" values="5.5;0.4;5.5" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </ellipse>
      <ellipse cx="74.5" cy="63.5" rx="3" ry="3.2" fill="#2563eb">
        <animate attributeName="ry" values="3.2;0.2;3.2" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
        <animate attributeName="cx" values="74.5;75.5;74.5;73.5;74.5" dur="7s" repeatCount="indefinite"/>
      </ellipse>
      <circle cx="74.5" cy="63.5" r="1.5" fill="#0f172a">
        <animate attributeName="r" values="1.5;0.1;1.5" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </circle>
      <circle cx="72.5" cy="61.5" r="1.3" fill="white" opacity="0.9">
        <animate attributeName="r" values="1.3;0;1.3" dur="5s" begin="1s" repeatCount="indefinite" keyTimes="0;0.03;0.08" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" calcMode="spline"/>
      </circle>
    </g>

    <!-- Nose -->
    <path d="M58 70c0 3 2 4 4 4" stroke="#b8896e" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Friendly smirk -->
    <path d="M48 80c3 3 10 4 16 2 3-1 5-3 6-5" stroke="#a06b55" stroke-width="2" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M48 80c3 3 10 4 16 2 3-1 5-3 6-5;M48 79c3 4 10 5 16 3 3-1 5-3 6-5;M48 80c3 3 10 4 16 2 3-1 5-3 6-5" dur="4s" repeatCount="indefinite"/>
    </path>

    <!-- Subtle stubble -->
    <g fill="#8b7355" opacity="0.2">
      <circle cx="48" cy="88" r="0.5"/><circle cx="52" cy="89" r="0.5"/>
      <circle cx="56" cy="88" r="0.5"/><circle cx="60" cy="89" r="0.5"/>
      <circle cx="64" cy="88" r="0.5"/><circle cx="68" cy="87" r="0.5"/>
    </g>
  </g>
</svg>
